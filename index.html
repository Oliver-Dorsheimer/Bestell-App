<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="color_and_text.css">
    <link rel="stylesheet" href="style.css">
    <script defer src = "script.js"></script>
    <link rel="icon" type="image/x-icon" href="./assets/img/logo.png">
    <title>Burger House</title>
</head>
<body>
    <header>
        <div class = "header_container outer_distance content_limitation">
            <img class = "header_icon" src = "assets/icon/header_icon.png" alt="image which shows the app logo">
            <img class = "header_menu" src = "assets/icon/header_menu.png" alt="image burger menu">
        </div>
    </header>
    <section class = "section_hero">
        <div class = "hero_logo_container">
            <img class = "hero_logo" src="assets/img/logo.png" alt="image with the company logo that show a burger">
        </div>
    </section>
    <section class = "section_title">
            <div class = "main_title_container">
                <h1><span class = "title_primary">Burger</span> House</h1>
                <div class = "title_rating_container">
                    <img class = "title_rating_icon" src = "assets/icon/star_icon.png" alt="rating of the restaurant">
                    <p class = "rating_text">4,1<span>(317)</span></p>
                </div>
            </div>
            <p class = "title_undertext">The best of Burgers, Pizza, and Greens, all in one great place.</p>
    </section>
    <main>
        <section id = "section_burger_and_sandwiches">
            <div class = "category_header">
                <div class = "category_container outer_distance content_limitation">
                    <img class = "category_icon" src="assets/icon/burger_icon.png" alt="icon of a burger">
                    <h2 class = "category_title">Burger & Sandwiches</h2>
                </div>
            </div>

        </section>
        <section id = "section_pizza">
            <div class = "category_header">
                <div class = "category_container outer_distance content_limitation">
                    <img class = "category_icon" src="assets/icon/pizza_icon.png" alt="icon of a pizza">
                    <h2 class = "category_title">Pizza (30cm)</h2>
                </div>
            </div>

        </section>
        <section id = "section_salad">
            <div class = "category_header">
                <div class = "category_container outer_distance content_limitation">
                    <img class = "category_icon" src="assets/icon/salad.png" alt="icon of a salad">
                    <h2 class = "category_title">Salad</h2>
                </div>
            </div>

        </section>
    </main>
    <footer>
        <div class = "footer_content">
            <p class = "footer_text"><img src="assets/icon/copyright_icon.png" alt="copyright icon">2025 Burger House</p>
            <p class = "footer_text">Imprint</p>
            <p class = "footer_text">Cookie Preferences</p>
        </div>
    </footer>
    
</body>
</html>
